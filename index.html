<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Péremptions">
  <meta name="description" content="Gestion des dates de péremption — station-service">
  <title>Péremptions Shop</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424;
      --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
      --text:#f0ede8; --muted:#888580; --faint:#444;
      --exp-text:#f47c7c; --exp-dot:#e24b4a;
      --crit-text:#f4a96a; --crit-dot:#ef9f27;
      --warn-text:#d4c84a; --warn-dot:#c9b800;
      --ok-text:#74c97a; --ok-dot:#52b85a;
      --accent:#e8e0d4;
      --radius:14px; --radius-sm:8px;
      --font:'DM Sans',system-ui,sans-serif;
      --mono:'DM Mono',monospace;
      --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
    #app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto}

    /* HEADER */
    .header{padding:calc(var(--sat) + 16px) 20px 0;background:var(--bg);position:sticky;top:0;z-index:10}
    .header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
    .header-title{font-size:26px;font-weight:300;letter-spacing:-0.5px;line-height:1.1}
    .header-title span{font-weight:500}
    .header-date{font-size:12px;color:var(--muted);margin-top:3px}
    .header-btns{display:flex;gap:8px;align-items:center}

    .mic-fab{width:40px;height:40px;border-radius:50%;background:#1a3a2a;border:0.5px solid rgba(82,184,90,0.4);color:var(--ok-dot);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
    .mic-fab.listening{background:var(--ok-dot);color:#0f0f0f;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(82,184,90,0.4)}50%{box-shadow:0 0 0 8px rgba(82,184,90,0)}}

    .header-add-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;color:#0f0f0f;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s,opacity 0.15s}
    .header-add-btn:active{transform:scale(0.92);opacity:0.85}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;padding:12px 20px}
    .stat{background:var(--surface);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;border:0.5px solid var(--border)}
    .stat-val{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1}
    .stat-lbl{font-size:10px;color:var(--muted);margin-top:4px}
    .stat.exp .stat-val{color:var(--exp-dot)}.stat.crit .stat-val{color:var(--crit-dot)}.stat.ok .stat-val{color:var(--ok-dot)}.stat.total .stat-val{color:var(--text)}

    /* BANNIERES */
    .alert-banner{margin:0 20px 10px;background:#2a1010;border:0.5px solid rgba(226,75,74,0.3);border-radius:var(--radius-sm);padding:10px 12px;display:none}
    .alert-banner.show{display:block}
    .alert-title{font-size:12px;font-weight:500;color:var(--exp-text);margin-bottom:4px}
    .alert-items{font-size:11px;color:rgba(244,124,124,0.75);line-height:1.6}

    .vocal-banner{margin:0 20px 10px;background:#0d1f10;border:0.5px solid rgba(82,184,90,0.3);border-radius:var(--radius-sm);padding:10px 12px;display:none}
    .vocal-banner.show{display:block}
    .vocal-label{font-size:11px;color:var(--ok-text);margin-bottom:6px;font-weight:500}
    .vocal-hint{font-size:10px;color:var(--muted);margin-bottom:4px;font-style:italic}
    .vocal-text{font-size:13px;color:var(--text);line-height:1.5;min-height:20px}

    .install-banner{margin:0 20px 10px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;display:none;align-items:center;gap:10px}
    .install-banner.show{display:flex}
    .install-text{flex:1;font-size:12px;color:var(--muted);line-height:1.4}
    .install-btn{font-size:12px;font-weight:500;padding:6px 14px;background:var(--accent);color:#0f0f0f;border:none;border-radius:20px;cursor:pointer;font-family:var(--font);flex-shrink:0}
    .install-close{background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px}

    /* FILTRES */
    .filters-wrap{padding:0 20px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .filters-wrap::-webkit-scrollbar{display:none}
    .filters{display:flex;gap:6px;width:max-content}
    .chip{font-family:var(--font);font-size:12px;padding:5px 14px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.15s}
    .chip.active{background:var(--accent);color:#0f0f0f;border-color:var(--accent);font-weight:500}

    /* LISTE */
    .list-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px calc(var(--sab) + 20px)}
    .list-wrap::-webkit-scrollbar{display:none}
    .cat-sep{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);padding:16px 0 6px}
    .product-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;transition:opacity 0.2s}
    .product-card.removed{opacity:0.35}
    .status-bar{width:3px;height:36px;border-radius:2px;flex-shrink:0}
    .status-bar.exp{background:var(--exp-dot)}.status-bar.crit{background:var(--crit-dot)}.status-bar.warn{background:var(--warn-dot)}.status-bar.ok{background:var(--ok-dot)}.status-bar.removed{background:var(--faint)}
    .product-info{flex:1;min-width:0}
    .product-name{font-size:14px;font-weight:500;white-space:normal;word-break:break-word;line-height:1.3}
    .product-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .product-right{text-align:right;flex-shrink:0}
    .product-date{font-family:var(--mono);font-size:13px;font-weight:500}
    .product-date.exp{color:var(--exp-text)}.product-date.crit{color:var(--crit-text)}.product-date.warn{color:var(--warn-text)}.product-date.ok{color:var(--ok-text)}.product-date.removed{color:var(--muted)}
    .product-days{font-size:10px;color:var(--muted);margin-top:2px}
    .product-actions{display:flex;gap:4px;flex-shrink:0}
    .action-btn{width:32px;height:32px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
    .action-btn:active{transform:scale(0.9)}
    .action-btn.del:active{color:var(--exp-dot);border-color:var(--exp-dot)}
    .action-btn.check:active{color:var(--ok-dot);border-color:var(--ok-dot)}
    .empty-state{text-align:center;padding:60px 0 40px;color:var(--muted)}
    .empty-icon{font-size:40px;margin-bottom:12px;opacity:0.4}
    .empty-text{font-size:14px}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:var(--surface);border:0.5px solid var(--border2);border-radius:20px 20px 0 0;padding:20px 20px calc(var(--sab) + 24px);width:100%;max-width:430px;animation:slideUp 0.25s cubic-bezier(0.32,0.72,0,1);max-height:90vh;overflow-y:auto}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
    .modal-title{font-size:17px;font-weight:500;margin-bottom:18px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .field input{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:15px;padding:11px 14px;outline:none;-webkit-appearance:none;transition:border-color 0.15s}
    .field input:focus{border-color:var(--accent)}

    /* CATÉGORIES */
    .cat-section-label{font-size:11px;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
    .cat-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
    .cat-pill{font-size:12px;padding:6px 12px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--font);transition:all 0.15s;display:inline-flex;align-items:center;gap:4px}
    .cat-pill.selected{background:var(--accent);color:#0f0f0f;border-color:var(--accent);font-weight:500}
    .del-cat{font-size:9px;opacity:0.5;line-height:1;padding:1px 2px;border-radius:3px}
    .del-cat:hover{opacity:1;background:rgba(0,0,0,0.15)}

    .new-cat-row{display:flex;gap:6px;margin-bottom:14px}
    .new-cat-row input{flex:1;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:13px;padding:8px 12px;outline:none;-webkit-appearance:none}
    .new-cat-row input:focus{border-color:var(--accent)}
    .new-cat-row input::placeholder{color:var(--faint)}
    .new-cat-btn{padding:8px 14px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--muted);font-family:var(--font);font-size:13px;cursor:pointer;white-space:nowrap}

    .modal-footer{display:flex;gap:10px;margin-top:6px}
    .btn-cancel{flex:1;padding:13px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--muted);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer}
    .btn-save{flex:2;padding:13px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#0f0f0f;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:opacity 0.15s}
    .btn-save:active{opacity:0.85}

    /* TOAST */
    .toast{position:fixed;bottom:calc(var(--sab) + 24px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);font-size:13px;padding:10px 18px;border-radius:20px;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;white-space:nowrap;z-index:200}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div id="app">
  <header class="header">
    <div class="header-top">
      <div>
        <h1 class="header-title">pérem<span>ptions</span></h1>
        <p class="header-date" id="today-label"></p>
      </div>
      <div class="header-btns">
        <button class="mic-fab" id="mic-btn" onclick="toggleVoice()" title="Ajouter par la voix" aria-label="Saisie vocale">🎙</button>
        <button class="header-add-btn" onclick="openModal()" aria-label="Ajouter un produit">＋</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="alert-banner" id="alert-banner">
      <p class="alert-title">⚠ Produits urgents</p>
      <p class="alert-items" id="alert-items"></p>
    </div>

    <div class="vocal-banner" id="vocal-banner">
      <p class="vocal-label">🎙 En écoute…</p>
      <p class="vocal-hint">Ex : "Coca Cola 15 juin Boissons 6 pièces"</p>
      <p class="vocal-text" id="vocal-text">…</p>
    </div>

    <div class="install-banner" id="install-banner">
      <div class="install-text">Installer l'app sur l'écran d'accueil.</div>
      <button class="install-btn" onclick="installPWA()">Installer</button>
      <button class="install-close" onclick="dismissInstall()">×</button>
    </div>

    <div class="filters-wrap">
      <div class="filters">
        <button class="chip active" onclick="setFilter('all',this)">Tous</button>
        <button class="chip" onclick="setFilter('exp',this)">⬤ Expirés</button>
        <button class="chip" onclick="setFilter('crit',this)">⬤ ≤ 3 jours</button>
        <button class="chip" onclick="setFilter('warn',this)">⬤ ≤ 7 jours</button>
        <button class="chip" onclick="setFilter('ok',this)">⬤ OK</button>
        <button class="chip" onclick="setFilter('removed',this)">Retirés</button>
      </div>
    </div>
  </header>

  <main class="list-wrap" id="product-list" role="list"></main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 class="modal-title">Nouveau produit</h2>

    <div class="field">
      <label for="f-name">Nom du produit</label>
      <input type="text" id="f-name" placeholder="Ex : Coca Cola" autocomplete="off" enterkeyhint="next">
    </div>

    <div class="field">
      <label for="f-date">Date de péremption</label>
      <input type="date" id="f-date">
    </div>

    <div class="field">
      <label for="f-qty">Quantité</label>
      <input type="number" id="f-qty" min="1" max="999" value="1" inputmode="numeric">
    </div>

    <div style="margin-bottom:14px">
      <span class="cat-section-label">Catégorie</span>
      <div class="cat-picker" id="cat-picker"></div>
      <div class="new-cat-row">
        <input type="text" id="f-new-cat" placeholder="Nouvelle catégorie…" autocomplete="off" maxlength="30">
        <button class="new-cat-btn" onclick="addCustomCat()">＋ Ajouter</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveProduct()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  /* ---- ÉTAT ---- */
  let products     = JSON.parse(localStorage.getItem('expiry_v2') || '[]');
  let activeFilter = 'all';
  let selectedCat  = '';

  const DEFAULT_CATS = ['Boissons', 'Confiseries', 'Autre'];

  function getCustomCats() { return JSON.parse(localStorage.getItem('custom_cats') || '[]'); }
  function saveCustomCats(a) { localStorage.setItem('custom_cats', JSON.stringify(a)); }
  function getAllCats() { return [...DEFAULT_CATS, ...getCustomCats()]; }

  /* ---- UTILITAIRES DATE ---- */
  function getStatus(d, removed) {
    if (removed) return 'removed';
    const today = new Date(); today.setHours(0,0,0,0);
    const exp = new Date(d); exp.setHours(0,0,0,0);
    const diff = Math.floor((exp - today) / 86400000);
    return diff < 0 ? 'exp' : diff <= 3 ? 'crit' : diff <= 7 ? 'warn' : 'ok';
  }

  function getDaysLabel(d, removed) {
    if (removed) return 'Retiré du rayon';
    const today = new Date(); today.setHours(0,0,0,0);
    const exp = new Date(d); exp.setHours(0,0,0,0);
    const diff = Math.floor((exp - today) / 86400000);
    if (diff < -1) return `Expiré il y a ${Math.abs(diff)} jours`;
    if (diff === -1) return 'Expiré hier';
    if (diff === 0)  return "Expire aujourd'hui !";
    if (diff === 1)  return 'Expire demain';
    return `Dans ${diff} jours`;
  }

  function formatDate(d) {
    return new Date(d + 'T00:00:00').toLocaleDateString('fr-BE', {day:'2-digit',month:'2-digit',year:'2-digit'});
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function save() { localStorage.setItem('expiry_v2', JSON.stringify(products)); }

  /* ---- RENDU ---- */
  function render() {
    document.getElementById('today-label').textContent =
      new Date().toLocaleDateString('fr-BE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

    let nExp=0,nCrit=0,nWarn=0,nOk=0; const urgent=[];
    products.forEach(p => {
      if (p.removed) return;
      const s = getStatus(p.date, false);
      if (s==='exp')  { nExp++;  urgent.push(p.name+' (expiré)'); }
      if (s==='crit') { nCrit++; urgent.push(p.name+' — '+getDaysLabel(p.date,false)); }
      if (s==='warn') nWarn++;
      if (s==='ok')   nOk++;
    });

    document.getElementById('stats').innerHTML = `
      <div class="stat exp"><div class="stat-val">${nExp}</div><div class="stat-lbl">Expirés</div></div>
      <div class="stat crit"><div class="stat-val">${nCrit}</div><div class="stat-lbl">≤ 3j</div></div>
      <div class="stat ok"><div class="stat-val">${nOk}</div><div class="stat-lbl">OK</div></div>
      <div class="stat total"><div class="stat-val">${nExp+nCrit+nWarn+nOk}</div><div class="stat-lbl">Total</div></div>`;

    const banner = document.getElementById('alert-banner');
    if (urgent.length) { banner.classList.add('show'); document.getElementById('alert-items').textContent = urgent.join(' · '); }
    else banner.classList.remove('show');

    const filtered = products
      .filter(p => {
        const s = getStatus(p.date, p.removed);
        if (activeFilter==='all')     return !p.removed;
        if (activeFilter==='removed') return p.removed;
        return s === activeFilter;
      })
      .sort((a,b) => {
        if (a.removed && !b.removed) return 1;
        if (!a.removed && b.removed) return -1;
        return new Date(a.date)-new Date(b.date);
      });

    const listEl = document.getElementById('product-list');
    if (!filtered.length) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Aucun produit</div></div>';
      return;
    }

    const groups = {};
    filtered.forEach(p => { if (!groups[p.category]) groups[p.category]=[]; groups[p.category].push(p); });

    listEl.innerHTML = Object.entries(groups).map(([cat,items]) =>
      `<p class="cat-sep">${esc(cat)}</p>` +
      items.map(p => {
        const s = getStatus(p.date, p.removed);
        const sc = p.removed ? 'removed' : s;
        return `<article class="product-card ${p.removed?'removed':''}" role="listitem">
          <div class="status-bar ${sc}"></div>
          <div class="product-info">
            <div class="product-name">${esc(p.name)}</div>
            <div class="product-meta">Qté : ${p.qty}</div>
          </div>
          <div class="product-right">
            <div class="product-date ${sc}">${formatDate(p.date)}</div>
            <div class="product-days">${getDaysLabel(p.date,p.removed)}</div>
          </div>
          <div class="product-actions">
            <button class="action-btn del" onclick="deleteProduct('${p.id}')">✕</button>
          </div>
        </article>`;
      }).join('')
    ).join('');
  }

  /* ---- ACTIONS ---- */
  function toggleRemove(id) {
    const p = products.find(x=>x.id===id); if (!p) return;
    p.removed = !p.removed; save(); render();
    showToast(p.removed ? 'Retiré du rayon ✓' : 'Remis en rayon ✓');
  }

  function deleteProduct(id) {
    const p = products.find(x=>x.id===id);
    if (!p) return;
    if (!confirm(`Supprimer "${p.name}" ?`)) return;
    products = products.filter(x=>x.id!==id); save(); render();
    showToast('Produit supprimé');
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active'); render();
  }

  /* ---- CATÉGORIES ---- */
  function renderCatPicker() {
    const cats = getAllCats();
    const customCats = getCustomCats();
    if (!selectedCat || !cats.includes(selectedCat)) selectedCat = cats[0];

    document.getElementById('cat-picker').innerHTML = cats.map(cat => {
      const isCustom = customCats.includes(cat);
      const sel = cat === selectedCat;
      return `<button class="cat-pill${sel?' selected':''}" onclick="selectCat('${esc(cat)}')" data-cat="${esc(cat)}">${esc(cat)}${isCustom?`<span class="del-cat" onclick="event.stopPropagation();deleteCustomCat('${esc(cat)}')">✕</span>`:''}</button>`;
    }).join('');
  }

  function selectCat(name) { selectedCat = name; renderCatPicker(); }

  function addCustomCat() {
    const input = document.getElementById('f-new-cat');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const all = getAllCats();
    if (all.includes(name)) { selectCat(name); input.value=''; return; }
    const custom = getCustomCats();
    custom.push(name); saveCustomCats(custom);
    selectedCat = name; renderCatPicker();
    input.value = ''; showToast(`Catégorie "${name}" ajoutée ✓`);
  }

  function deleteCustomCat(name) {
    const custom = getCustomCats().filter(c=>c!==name);
    saveCustomCats(custom);
    if (selectedCat===name) selectedCat = getAllCats()[0]||'Autre';
    renderCatPicker(); showToast(`Catégorie "${name}" supprimée`);
  }

  /* ---- MODAL ---- */
  function openModal(prefill) {
    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
    document.getElementById('f-name').value  = prefill?.name || '';
    document.getElementById('f-date').value  = prefill?.date || tomorrow.toISOString().split('T')[0];
    document.getElementById('f-qty').value   = prefill?.qty  || '1';
    document.getElementById('f-new-cat').value = '';
    if (prefill?.category) selectedCat = prefill.category;
    renderCatPicker();
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(()=>document.getElementById('f-name').focus(), 250);
  }

  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
  function handleOverlayClick(e) { if (e.target.id==='modal-overlay') closeModal(); }

  function saveProduct() {
    const name = document.getElementById('f-name').value.trim();
    const date = document.getElementById('f-date').value;
    const qty  = parseInt(document.getElementById('f-qty').value)||1;
    if (!name) {
      const el = document.getElementById('f-name');
      el.style.borderColor='var(--exp-dot)'; setTimeout(()=>el.style.borderColor='',1500); el.focus(); return;
    }
    if (!date) { document.getElementById('f-date').focus(); return; }
    products.push({
      id: Date.now().toString(36)+Math.random().toString(36).slice(2,5),
      name, category: selectedCat||'Autre', date, qty, removed:false, addedAt:new Date().toISOString()
    });
    save(); closeModal(); render(); showToast('Produit ajouté ✓');
  }

  /* ---- SAISIE VOCALE ---- */
  let recognition = null;
  let isListening = false;

  function initSpeech() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const r = new SR();
    r.lang = 'fr-FR'; r.continuous = false; r.interimResults = true; r.maxAlternatives = 1;

    r.onresult = e => {
      const t = e.results[0][0].transcript;
      document.getElementById('vocal-text').textContent = t;
      if (e.results[0].isFinal) processVoice(t);
    };
    r.onerror = e => { stopListening(); showToast(e.error==='not-allowed'?'Micro non autorisé':'Erreur micro'); };
    r.onend = () => stopListening();
    return r;
  }

  function toggleVoice() {
    if (isListening) { stopListening(); return; }
    if (!recognition) recognition = initSpeech();
    if (!recognition) { showToast('Reconnaissance vocale non supportée'); return; }
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('mic-btn').textContent = '⏹';
    document.getElementById('vocal-banner').classList.add('show');
    document.getElementById('vocal-text').textContent = '…';
    recognition.start();
  }

  function stopListening() {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('mic-btn').textContent = '🎙';
    try { recognition && recognition.stop(); } catch(e) {}
    setTimeout(()=>document.getElementById('vocal-banner').classList.remove('show'), 2000);
  }

  function processVoice(text) {
    const lower = text.toLowerCase().trim();
    let name = text, dateStr = '', qty = 1;
    let category = selectedCat || getAllCats()[0];

    /* Quantité */
    const qm = lower.match(/(\d+)\s*(pi[eè]ces?|unit[ée]s?|exemplaires?|boîtes?|bouteilles?|canettes?|packs?)/);
    if (qm) { qty = parseInt(qm[1]); name = name.replace(new RegExp(qm[0],'i'),'').trim(); }
    else {
      const nm = lower.match(/\s(\d+)$/);
      if (nm) { qty = parseInt(nm[1]); name = name.replace(new RegExp('\\s'+nm[1]+'$'),'').trim(); }
    }

    /* Date en lettres : "15 juin" / "15 juin 2025" */
    const MONTHS = {janvier:1,jan:1,'février':2,fev:2,mars:3,avril:4,avr:4,mai:5,juin:6,juillet:7,jul:7,'août':8,aout:8,septembre:9,sep:9,octobre:10,oct:10,novembre:11,nov:11,'décembre':12,dec:12};
    const dw = lower.match(/(\d{1,2})\s+(janvier|jan|f[eé]vrier|fev|mars|avril|avr|mai|juin|juillet|jul|ao[uû]t|aout|septembre|sep|octobre|oct|novembre|nov|d[eé]cembre|dec)(?:\s+(\d{4}))?/);
    if (dw) {
      const day=parseInt(dw[1]), month=MONTHS[dw[2].normalize('NFD').replace(/[\u0300-\u036f]/g,'')]||MONTHS[dw[2]];
      const year = dw[3]?parseInt(dw[3]):new Date().getFullYear();
      let yr = year, mo = month||6;
      const today=new Date(); today.setHours(0,0,0,0);
      /* Si la date est déjà passée cette année, on prend l'année suivante */
      if (new Date(yr, mo-1, day) < today && !dw[3]) yr++;
      /* Construction directe en local (évite le bug fuseau UTC -1 jour) */
      dateStr = `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      name = name.replace(new RegExp(dw[0],'i'),'').trim();
    }

    /* Date en chiffres : "15/06" ou "15/06/2025" */
    if (!dateStr) {
      const ds = lower.match(/(\d{1,2})\/(\d{1,2})(?:\/(\d{4}))?/);
      if (ds) {
        const y=ds[3]?parseInt(ds[3]):new Date().getFullYear();
        dateStr=`${y}-${String(parseInt(ds[2])).padStart(2,'0')}-${String(parseInt(ds[1])).padStart(2,'0')}`;
        name = name.replace(ds[0],'').trim();
      }
    }

    /* Catégorie */
    for (const cat of getAllCats()) {
      if (lower.includes(cat.toLowerCase())) {
        category = cat;
        name = name.replace(new RegExp(cat,'i'),'').trim();
        break;
      }
    }

    name = name.replace(/\s+/g,' ').trim() || text.trim();
    openModal({ name, date:dateStr, qty:String(qty), category });
    showToast('Vérifiez et confirmez ✓');
  }

  /* ---- TOAST ---- */
  let toastTimer=null;
  function showToast(msg) {
    const el=document.getElementById('toast');
    el.textContent=msg; el.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
  }

  /* ---- PWA ---- */
  let deferredInstallPrompt=null;
  if ('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

  window.addEventListener('beforeinstallprompt', e=>{
    e.preventDefault(); deferredInstallPrompt=e;
    if (!localStorage.getItem('installDismissed')) document.getElementById('install-banner').classList.add('show');
  });

  function installPWA() {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(c=>{
      if (c.outcome==='accepted') { showToast('App installée ! 🎉'); document.getElementById('install-banner').classList.remove('show'); }
      deferredInstallPrompt=null;
    });
  }

  function dismissInstall() { document.getElementById('install-banner').classList.remove('show'); localStorage.setItem('installDismissed','1'); }
  if (window.matchMedia('(display-mode: standalone)').matches) localStorage.setItem('installDismissed','1');

  /* ---- DÉMO ---- */
  if (!products.length) {
    const d=n=>{const x=new Date();x.setDate(x.getDate()+n);return x.toISOString().split('T')[0]};
    products=[
      {id:'d1',name:'Coca Cola',       category:'Boissons',    date:d(1),  qty:6, removed:false,addedAt:new Date().toISOString()},
      {id:'d2',name:'Kit Kat',         category:'Confiseries', date:d(3),  qty:12,removed:false,addedAt:new Date().toISOString()},
      {id:'d3',name:'Red Bull',        category:'Boissons',    date:d(-1), qty:4, removed:false,addedAt:new Date().toISOString()},
      {id:'d4',name:'Chewing-gum Orbit',category:'Confiseries',date:d(20), qty:8, removed:false,addedAt:new Date().toISOString()},
    ];
    save();
  }

  /* ---- DÉMARRAGE ---- */
  render();
  renderCatPicker();

  document.getElementById('f-new-cat').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();addCustomCat();} });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
